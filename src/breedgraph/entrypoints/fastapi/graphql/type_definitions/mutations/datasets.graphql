input RecordInput {
    unitId: Int!
    value: String
    start: DateTime
    end: DateTime
    referenceIds: [Int]
}

input RecordUpdate {
    recordId: Int!
    unitId: Int
    value: String
    start: DateTime
    end: DateTime
    referenceIds: [Int]
}

input DatasetInput {
    studyId: Int!
    """ concept is either a Factor or Variable in the ontology """
    conceptId: Int!
    records: [RecordInput!]!
    contributorIds: [Int!]
    referenceIds: [Int!]
}

input DatasetUpdate {
    """
    Optionally provide a list of records to update
    """
    datasetId: Int!
    studyId: Int
    conceptId: Int
    records: [RecordUpdate!]!
    contributorIds: [Int!]
    referenceIds: [Int!]
}

extend type Mutation {
    """
    Submission Payloads include a key, the dataset is processed asynchronously
    Poll the datasetsSubmission using the returned submission ID for status reports.
    """
    datasetsSubmitRecords(dataset: DatasetInput!): SubmissionIdPayload!,
    datasetsUpdateRecords(dataset: DatasetUpdate!): SubmissionIdPayload!
    """Delete records from a dataset"""
    datasetsRemoveRecords(datasetId: Int!, recordIds: [Int!]!): BooleanPayload!
}
