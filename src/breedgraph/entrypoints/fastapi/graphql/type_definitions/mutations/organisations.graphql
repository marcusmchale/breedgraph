input TeamInput {
    """ Required name for the team """
    name: String!
    """ Optional full name for the team """
    fullname: String
    """ Optional parent team to extend an organisation"""
    parentId: Int
}

input TeamUpdate {
    teamId: Int!
    name: String
    fullname: String
}

extend type Mutation {
    organisationsCreateTeam(
        team: TeamInput!
    ): BooleanPayload!
    organisationsDeleteTeam(
        teamId: Int!
    ): BooleanPayload!
    organisationsUpdateTeam(
        team: TeamUpdate!
    ): BooleanPayload!
}